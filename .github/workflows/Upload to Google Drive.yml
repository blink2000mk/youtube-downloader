name: Upload to Google Drive

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["youtube-downloader"]
    types:
      - completed

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure Google Drive (Fixed)
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          client_id = 440335527099-k2k1tkmh5cbvmpnuj02b0iiqnr118ce7.apps.googleusercontent.com
          client_secret = ${{ secrets.GDRIVE_CLIENT_SECRET }}
          scope = drive.file
          token = {"access_token":"dummy","token_type":"Bearer","refresh_token":"${{ secrets.GDRIVE_REFRESH_TOKEN }}","expiry":"2099-12-31T23:59:59Z"}
          EOF

      - name: Test Connection & Upload
        run: |
          echo "🔄 تست اتصال به Google Drive..."
          rclone about gdrive: || echo "اتصال ناموفق"

          echo "📤 در حال آپلود..."
          rclone mkdir gdrive:YouTube-Downloads 2>/dev/null || true
          
          rclone copy youtube gdrive:YouTube-Downloads/ --create-empty-src-dirs --transfers 6 --verbose || true
          rclone copy leecher-content gdrive:YouTube-Downloads/ --create-empty-src-dirs --transfers 6 --verbose || true
          
          echo "✅ عملیات آپلود تمام شد!"
