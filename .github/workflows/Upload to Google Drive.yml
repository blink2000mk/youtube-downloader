name: Upload to Google Drive

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["youtube-downloader.yml"]
    types:
      - completed

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure Google Drive
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          client_id = 440335527099-k2k1tkmh5cbvmpnuj02b0iiqnr118ce7.apps.googleusercontent.com
          client_secret = ${{ secrets.GDRIVE_CLIENT_SECRET }}
          scope = drive.file
          token = {"access_token":"dummy","token_type":"Bearer","refresh_token":"${{ secrets.GDRIVE_REFRESH_TOKEN }}","expiry":"2026-12-31T00:00:00Z"}
          EOF

      - name: Upload to Google Drive
        run: |
          rclone mkdir gdrive:YouTube-Downloads 2>/dev/null || true
          rclone copy youtube gdrive:YouTube-Downloads/ --create-empty-src-dirs --transfers 8 --verbose || true
          rclone copy leecher-content gdrive:YouTube-Downloads/ --create-empty-src-dirs --transfers 8 --verbose || true
          echo "✅ آپلود با موفقیت انجام شد!"
