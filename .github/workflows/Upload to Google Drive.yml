name: Upload to Google Drive with rclone mount

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["youtube-downloader"]
    types:
      - completed

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install rclone and fuse
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone fuse

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          client_id = 440335527099-k2k1tkmh5cbvmpnuj02b0iiqnr118ce7.apps.googleusercontent.com
          client_secret = ${{ secrets.GDRIVE_CLIENT_SECRET }}
          scope = drive.file
          token = {"access_token":"dummy","token_type":"Bearer","refresh_token":"${{ secrets.GDRIVE_REFRESH_TOKEN }}","expiry":"2099-12-31T23:59:59Z"}
          EOF

      - name: Mount Google Drive and Copy files
        run: |
          mkdir -p ~/gdrive_mount
          rclone mount gdrive: ~/gdrive_mount --daemon --vfs-cache-mode writes --dir-cache-time 5m --vfs-read-chunk-size 32M &
          sleep 8
          
          echo "📤 در حال کپی فایل‌ها..."
          cp -r youtube/* ~/gdrive_mount/YouTube-Downloads/ 2>/dev/null || true
          cp -r leecher-content/* ~/gdrive_mount/YouTube-Downloads/ 2>/dev/null || true
          
          echo "✅ کپی انجام شد"
          fusermount -u ~/gdrive_mount 2>/dev/null || true
